<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>Create Account</title>

    <link rel="stylesheet" href="signup.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <!-- LEFT SIDE -->

        <div class="left-panel">

            <div class="logo">
                <span class="green-dot"></span>
                A-DAP-T
            </div>

            <h1>Deploy with CONFIDENCE</h1>

            <h3>
                From prototype to production without the surprises.
            </h3>

            <div class="glow-circle"></div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="signup-card">

            <h2>Create Account</h2>

            <form id="signupForm">

                <div class="input-group">
                    <label>Full Name</label>

                    <input type="text" id="signupName" placeholder="John Doe" required>
                </div>

                <div class="input-group">
                    <label>Email</label>

                    <input type="email" id="signupEmail" placeholder="john@example.com" required>
                </div>

                <!-- PASSWORD -->

                <div class="input-group">

                    <label>Password</label>

                    <div class="password-box">

                        <input type="password" id="password" placeholder="Enter password" required>

                        <button type="button" id="togglePassword">
                            👁
                        </button>

                    </div>

                </div>

                <!-- CONFIRM PASSWORD -->

                <div class="input-group">

                    <label>Confirm Password</label>

                    <div class="password-box">

                        <input type="password" id="confirmPassword" placeholder="Confirm password" required>

                        <button type="button" id="toggleConfirmPassword">
                            👁
                        </button>

                    </div>

                </div>

                <button class="signup-btn" type="submit">
                    Create Account
                </button>

            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <button class="google-btn">
                Continue with Google
            </button>

            <p class="login-link">
                Already have an account?
                <a href="signin.html">
                    Login
                </a>
            </p>

        </div>

    </div>

    <script src="signup.js"></script>

</body>

</html>
