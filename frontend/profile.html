    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>Profile | A-DAP-T</title>
<script>
(function () {
  const auth = localStorage.getItem('adpt_auth');
  let hasToken = false;
  try {
    const parsed = auth ? JSON.parse(auth) : null;
    hasToken = !!(parsed && parsed.idToken);
  } catch (_) {
    hasToken = false;
  }

  if (!hasToken) {
    const next = window.location.pathname + window.location.search + window.location.hash;
    window.location.replace('signup.html?next=' + encodeURIComponent(next));
  }
})();
</script>
<style id="auth-preload-guard">body{visibility:hidden}</style>
<script>
(function () {
  const auth = localStorage.getItem('adpt_auth');
  let hasToken = false;
  try {
    const parsed = auth ? JSON.parse(auth) : null;
    hasToken = !!(parsed && parsed.idToken);
  } catch (_) {
    hasToken = false;
  }

  if (hasToken) {
    document.addEventListener('DOMContentLoaded', function () {
      document.body.style.visibility = 'visible';
    });
  }
})();
</script>

.profile-h1 em { color: var(--gl); font-style: normal; }
.profile-card { background: var(--bg2); border: 1px solid var(--bd); border-radius: var(--r); padding: 1.5rem; margin-bottom: 1rem; }
.profile-top { display: flex; gap: 1.5rem; align-items: center; }
.profile-top img { width: 76px; height: 76px; border-radius: 50%; object-fit: cover; border: 1px solid var(--gd); }
.profile-name { color: var(--wht); font-size: 1.4rem; font-weight: 700; }
.profile-email { font-family: var(--M); color: var(--muted); font-size: .72rem; }
.history-list { display: flex; flex-direction: column; gap: .75rem; }
.history-item { background: var(--bg2); border: 1px solid var(--bd); border-radius: var(--r); padding: 1rem 1.15rem; display: grid; grid-template-columns: 1fr auto; gap: .75rem; align-items: center; }

<script src="main.js"></script>
<script>
async function loadHistory() {
  const auth = getAuthState();
  const status = document.getElementById('history-status');
  const list = document.getElementById('history-list');

  if (!auth) {
    document.getElementById('profile-name').textContent = 'Guest user';
    document.getElementById('profile-email').textContent = 'Sign in to view saved scan reports.';
    status.innerHTML = 'You are not signed in. <a href="signin.html" style="color:var(--gl)">Sign in</a> to view saved reports.';
    return;
  }

  document.getElementById('profile-name').textContent = auth.displayName || 'A-DAP-T User';
  document.getElementById('profile-email').textContent = auth.email || '';

  try {
    let reports;
    try {
      reports = await apiFetch('/reports');
    } catch (err) {
      reports = await apiFetch('/history');
    }

    if (!Array.isArray(reports) || reports.length === 0) {
      status.textContent = 'No saved reports yet. Run a scan with “Save report” enabled.';
      return;
    }

    status.textContent = '';
    list.innerHTML = '';

    reports.forEach(report => {
      const item = document.createElement('div');
      item.className = 'history-item';
      const created = report.created_at || report.timestamp || report.generated_at || 'Unknown date';
      const id = report.id || report.report_id || '';
      item.innerHTML = `
        <div>
          <div class="history-title">${escapeHtml(report.project_name || report.repo_name || 'A-DAP-T Scan')}</div>
          <div class="history-meta">Score: ${escapeHtml(String(report.safety_score ?? '—'))} · ${escapeHtml(report.status || '—')} · ${escapeHtml(created)}</div>
        </div>
        <div class="history-actions">
          <button class="btn btn-p btn-sm" data-open>OPEN</button>
          ${id ? '<button class="btn btn-g btn-sm" data-delete>DELETE</button>' : ''}
        </div>
      `;

      item.querySelector('[data-open]').addEventListener('click', async () => {
        try {
          let fullReport = report;
          if (id) {
            fullReport = await apiFetch(`/reports/${encodeURIComponent(id)}`);
          }
          sessionStorage.setItem('adpt_result', JSON.stringify(fullReport));
          window.location.href = 'pages/report.html';
        } catch (err) {
          alert(err.message || 'Could not open saved report.');
        }
      });

      const deleteBtn = item.querySelector('[data-delete]');
      if (deleteBtn && id) {
        deleteBtn.addEventListener('click', async () => {
          if (!confirm('Delete this saved report?')) return;
          try {
            await apiFetch(`/reports/${encodeURIComponent(id)}`, { method: 'DELETE' });
            item.remove();
          } catch (err) {
            alert(err.message || 'Could not delete report.');
          }
        });
      }

      list.appendChild(item);
    });
  } catch (err) {
    status.textContent = err.message || 'Could not load report history.';
  }
}

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

document.addEventListener('DOMContentLoaded', loadHistory);
</script>
